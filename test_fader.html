<!DOCTYPE html>
<html lang="en">
<head>
<style>
.fader {
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  width: 20px;
  height: 150px;
  writing-mode: vertical-lr;
  direction: rtl;
}
.fader::-webkit-slider-runnable-track {
  width: 6px;
  height: 100%;
  background: #ccc;
  border-radius: 99px;
}
.fader::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  height: 20px;
  width: 20px;
  background: red;
  border-radius: 50%;
  margin-left: -7px;
}
</style>
</head>
<body>
<input type="range" class="fader" min="0" max="255">
<script>
  document.querySelector('.fader').addEventListener('input', e => console.log(e.target.value));
</script>
</body>
</html>
