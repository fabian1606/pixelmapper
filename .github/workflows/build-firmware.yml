name: Build & Release ESP32 Firmware

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger: bun run release  (or: git tag v1.2.3 && git push origin v1.2.3)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        run: |
          rustup install nightly-2026-03-12
          rustup component add rust-src --toolchain nightly-2026-03-12

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs-engine

      - name: Install PlatformIO
        run: pip install platformio

      # Must run BEFORE pio build so version.h is set when link_rust.py + compiler run
      - name: Inject version from tag into version.h
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          mkdir -p pio/include
          printf '#pragma once\n#define FIRMWARE_VERSION "%s"\n' "$VER" \
            > pio/include/version.h
          echo "Firmware version: $VER"
          echo "VERSION=$VER" >> "$GITHUB_ENV"

      # PlatformIO pre-script (link_rust.py) builds rs-engine-ffi automatically.
      # link_rust.py adds PlatformIO's riscv32-esp-elf GCC to PATH for the Rust linker.
      - name: Build firmware
        run: pio run
        working-directory: pio

      # Merge bootloader + partitions + app into a single flashable image (address 0x0)
      - name: Create merged firmware binary
        run: |
          python -m esptool --chip esp32p4 merge_bin \
            -o firmware.bin \
            --flash_mode dio \
            --flash_size 32MB \
            0x0    .pio/build/waveshare_p4_poe/bootloader.bin \
            0x8000 .pio/build/waveshare_p4_poe/partitions.bin \
            0x10000 .pio/build/waveshare_p4_poe/firmware.bin
        working-directory: pio

      - name: Write firmware-meta.json
        run: |
          echo "{\"version\":\"$VERSION\"}" > firmware-meta.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Firmware ${{ github.ref_name }}
          make_latest: true
          files: |
            pio/firmware.bin
            firmware-meta.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
